# ══════════════════════════════════════════════════════════════
# GITHUB ACTIONS — terraform-apply.yml
# Runs only when a PR is merged to main.
# This is the actual infrastructure apply — it changes real AWS resources.
# Requires the PR validation workflow to have passed first.
# ══════════════════════════════════════════════════════════════

name: Terraform Apply

# Only trigger when code is pushed to main — i.e. after a PR is merged
on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest

    # Require manual approval before applying to real infrastructure
    # Set up an environment called 'production' in GitHub repo settings
    # and add yourself as a required reviewer
    environment: production

    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init

      # Apply all changes — -auto-approve skips the interactive confirmation
      # Safe here because the PR review process already validated the changes
      - name: Terraform Apply
        run: terraform apply -auto-approve

      # Print the outputs after apply so they appear in the Actions log
      - name: Show Terraform outputs
        run: terraform output
